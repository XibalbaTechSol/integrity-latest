name: CI

# Mirrors the root Makefile's `test` target, split into one job per package so a
# failure in one toolchain doesn't hide results from the others (see Makefile / README
# "Local development"). `test-e2e` (Playwright, needs a full booted stack) and `demo`
# (live Base Sepolia) are deliberately NOT run here — see docs/TESTING.md for why they're
# a separate, slower layer.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  FOUNDRY_VERSION: v1.7.1
  RUST_VERSION: "1.96.0"
  NARGO_VERSION: "1.0.0-beta.22"
  # Full dated nightly string required -- "5.0.0-nightly" alone 404s against bbup's
  # release lookup. Verified locally (`~/.bb/bb --version`) and against a clean
  # ubuntu:24.04 container before pinning here, not guessed.
  BB_VERSION: "5.0.0-nightly.20260522"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.x"

jobs:
  contracts:
    name: contracts (forge test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      - run: npm install
        working-directory: contracts
      - run: forge test -vvv
        working-directory: contracts

  zkp:
    name: integrity-zkp (nargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Noir (nargo)
        run: |
          curl --fail -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - run: ~/.nargo/bin/noirup -v ${{ env.NARGO_VERSION }}
      - run: nargo test
        working-directory: integrity-zkp

  oracle:
    name: integrity-oracle (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: integrity-oracle
      # backend/src/zk.rs's unit tests shell out to a real `bb verify` (see
      # zk::tests::verifies_a_real_bb_generated_proof and
      # ::rejects_a_proof_against_tampered_public_inputs) against a checked-in fixture —
      # they need the `bb` binary on PATH even though this job never touches ORACLE_E2E.
      - name: Install Barretenberg (bb)
        run: |
          curl --fail -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/next/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> "$GITHUB_PATH"
      - run: ~/.bb/bbup -v ${{ env.BB_VERSION }}
      # Real-toolchain (ORACLE_E2E=1) tests need Postgres/Redis/anvil/forge and are NOT
      # run here — this job runs `cargo test --workspace --lib` plus the e2e test
      # binary's default (skip-logging) path, matching what a bare `cargo test` does
      # without ORACLE_E2E set. See backend/tests/e2e.rs's own doc comment.
      - run: cargo test --workspace
        working-directory: integrity-oracle

  sdk:
    name: integrity-sdk (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      - run: npm install
        working-directory: contracts
      - run: uv sync
        working-directory: integrity-sdk
      - run: uv run pytest
        working-directory: integrity-sdk

  cli:
    name: integrity-cli (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      - run: npm install
        working-directory: contracts
      - run: uv sync
        working-directory: integrity-cli
      - run: uv run pytest
        working-directory: integrity-cli

  bcc_middleware:
    name: bcc_middleware (pytest + opa test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      - name: Install OPA
        run: |
          sudo curl --fail -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/v1.18.2/opa_linux_amd64_static
          sudo chmod +x /usr/local/bin/opa
      - run: uv sync
        working-directory: bcc_middleware
      - run: uv run pytest
        working-directory: bcc_middleware
      - run: opa test policies/ -v
        working-directory: bcc_middleware

  userapi:
    name: integrity-userapi (pytest)
    runs-on: ubuntu-latest
    services:
      userapi-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: integrity_userapi
          POSTGRES_USER: integrity
          POSTGRES_PASSWORD: integrity_dev_only
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U integrity -d integrity_userapi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync
        working-directory: integrity-userapi
      - run: uv run pytest
        working-directory: integrity-userapi

  mvp:
    name: integrity-mvp (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: integrity-mvp
      - run: npm test
        working-directory: integrity-mvp

  # Fires only when a required job above fails on `main` (not on PRs — a PR author's own
  # branch shouldn't get an autonomous Jules task filed against it without their say-so).
  #
  # Calls the real Jules API (POST https://jules.googleapis.com/v1alpha/sessions,
  # X-Goog-Api-Key auth) directly via curl — verified by reading @google/jules-sdk's
  # actual source (dist/index.mjs), not guessed. AUTOMATION_MODE_AUTO_CREATE_PR means
  # Jules investigates the failing run and opens a PR with a fix on its own branch; it
  # never pushes to `main` directly.
  #
  # One-time setup still required from the repo owner before this does anything:
  #   1. Authorize Jules for XibalbaTechSol/integrity-latest at https://jules.google.com
  #      (grants the Jules GitHub App read/write access to this repo).
  #   2. Add a JULES_API_KEY repository secret (Settings -> Secrets and variables ->
  #      Actions), from a key issued at https://jules.google.com/settings/api.
  # Until both are done this job will fail with 401/404 from the Jules API rather than
  # silently no-op — that's intentional, so a misconfiguration is visible in the Actions
  # tab rather than looking like the automation ran and found nothing to do.
  notify-jules-on-failure:
    name: Trigger Jules on main-branch failure
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [contracts, zkp, oracle, sdk, cli, bcc_middleware, userapi, mvp]
    steps:
      - name: Create a Jules session to investigate and fix the failing run
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$JULES_API_KEY" ]; then
            echo "::error::JULES_API_KEY secret is not set. See this job's own comments for one-time setup steps."
            exit 1
          fi
          curl -sS -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                --arg prompt "CI failed on main (run: ${RUN_URL}, commit: ${{ github.sha }}). Investigate the failing job's logs, identify the root cause, fix it, and open a PR. Do not force-push or bypass the existing test suite to make it pass." \
                --arg title "Auto-fix: CI failure on main (${{ github.sha }})" \
                --arg source "sources/github/${{ github.repository }}" \
                '{prompt: $prompt, title: $title, sourceContext: {source: $source, githubRepoContext: {startingBranch: "main"}}, automationMode: "AUTO_CREATE_PR", requirePlanApproval: false}')" \
            --fail-with-body
